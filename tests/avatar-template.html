<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0}
body{width:1024px;height:1024px;background:#0A0A10;font-family:'Menlo','SF Mono',monospace;position:relative;overflow:hidden}
/* subtle radial glow so the avatar doesn't read as a flat black circle at small sizes */
.glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 42%,rgba(255,92,22,.10),transparent 55%)}
.n{position:absolute;left:50%;top:50%;transform:translate(-58%,-54%);font-size:680px;font-weight:700;color:#EDEDF2}
.dot{position:absolute;right:170px;bottom:218px;width:148px;height:148px;border-radius:50%;background:#FF5C16}
</style></head><body><div class="glow"></div><div class="n">n</div><div class="dot"></div></body></html>
