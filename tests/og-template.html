<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1200px;height:630px;background:#0A0A10;color:#EDEDF2;font-family:'Menlo','SF Mono',monospace;overflow:hidden;position:relative}
.wrap{padding:70px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.logo{font-size:34px;font-weight:700;letter-spacing:-1px}
.logo .dot{color:#FF5C16}
.h1{font-family:system-ui,-apple-system,sans-serif;font-size:74px;font-weight:700;letter-spacing:-2.5px;line-height:1.05;max-width:950px}
.h1 em{font-style:normal;color:#FF5C16}
.sub{font-size:19px;color:#8A8A9A;margin-top:22px;white-space:nowrap}
.stats{display:flex;gap:64px}
.stat .n{font-size:44px;font-weight:700}
.stat .l{font-size:15px;color:#8A8A9A;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.t{color:#89B0FF}.h{color:#D075FF}.w{color:#BAF24A}
.bar{position:absolute;left:0;right:0;bottom:0;height:12px;display:flex}
.bar div:nth-child(1){flex:256;background:#89B0FF}
.bar div:nth-child(2){flex:54;background:#D075FF}
.bar div:nth-child(3){flex:47;background:#BAF24A}
</style></head><body>
<div class="wrap">
  <div class="logo">neobank<span class="dot">beat</span></div>
  <div>
    <div class="h1">who watches the <em>neobanks</em>?</div>
    <div class="sub">358 verified-active neobanks · custody · cards · yield · stablecoins · regulation</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n">358</div><div class="l">tracked</div></div>
    <div class="stat t"><div class="n">256</div><div class="l">traditional</div></div>
    <div class="stat h"><div class="n">54</div><div class="l">hybrid crypto</div></div>
    <div class="stat w"><div class="n">47</div><div class="l">web3-native</div></div>
  </div>
</div>
<div class="bar"><div></div><div></div><div></div></div>
</body></html>
